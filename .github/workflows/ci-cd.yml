name: TaskFlow CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pertemuan-09-cicd/pbl-taskflow-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false
      - name: Fix go.mod
        run: sed -i 's|github.com/jackc/pgservicefile v0.0.0-20231201235250-de7065d787f4|github.com/jackc/pgservicefile v0.0.0-20200307190119-3fe961f6962c|g' go.mod
      - name: Run go vet
        run: go vet ./...

  unit-test:
    name: Unit Test + Race Detector
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: pertemuan-09-cicd/pbl-taskflow-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false
      - name: Fix go.mod
        run: sed -i 's|github.com/jackc/pgservicefile v0.0.0-20231201235250-de7065d787f4|github.com/jackc/pgservicefile v0.0.0-20200307190119-3fe961f6962c|g' go.mod
      - name: Run unit tests with race detector
        run: go test -race -count=1 ./internal/validator/... ./internal/service/... ./internal/repository/...

  integration-test:
    name: Integration Test (PostgreSQL)
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: pertemuan-09-cicd/pbl-taskflow-go
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: taskflow
          POSTGRES_PASSWORD: taskflow_secret
          POSTGRES_DB: taskflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://taskflow:taskflow_secret@localhost:5432/taskflow?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false
      - name: Fix go.mod
        run: sed -i 's|github.com/jackc/pgservicefile v0.0.0-20231201235250-de7065d787f4|github.com/jackc/pgservicefile v0.0.0-20200307190119-3fe961f6962c|g' go.mod
      - name: Run integration tests
        run: go test -tags=integration -race -count=1 ./...

  coverage-gate:
    name: Coverage Gate (≥75%)
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test]
    defaults:
      run:
        working-directory: pertemuan-09-cicd/pbl-taskflow-go
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: taskflow
          POSTGRES_PASSWORD: taskflow_secret
          POSTGRES_DB: taskflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://taskflow:taskflow_secret@localhost:5432/taskflow?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false
      - name: Fix go.mod
        run: sed -i 's|github.com/jackc/pgservicefile v0.0.0-20231201235250-de7065d787f4|github.com/jackc/pgservicefile v0.0.0-20200307190119-3fe961f6962c|g' go.mod
      - name: Run tests + coverage
        run: go test -tags=integration -coverprofile=cov.out ./internal/validator/... ./internal/service/... ./internal/repository/...
      - name: Check coverage ≥75%
        run: |
          python3 -c "
          import subprocess, sys
          r = subprocess.run(['go','tool','cover','-func=cov.out'], capture_output=True, text=True)
          for line in r.stdout.split('\n'):
              if 'total' in line:
                  pct = float(line.split()[-1].replace('%',''))
                  print(f'Coverage: {pct}%')
                  sys.exit(0 if pct >= 75 else 1)
          "
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: pertemuan-09-cicd/pbl-taskflow-go/cov.out

  build-binary:
    name: Build Binary
    runs-on: ubuntu-latest
    needs: coverage-gate
    defaults:
      run:
        working-directory: pertemuan-09-cicd/pbl-taskflow-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false
      - name: Fix go.mod
        run: sed -i 's|github.com/jackc/pgservicefile v0.0.0-20231201235250-de7065d787f4|github.com/jackc/pgservicefile v0.0.0-20200307190119-3fe961f6962c|g' go.mod
      - name: Build binary
        run: go build -o bin/taskflow-api ./cmd/server