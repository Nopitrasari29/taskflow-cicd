name: TaskFlow CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pertemuan-09-cicd/pbl-taskflow-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false
      - name: Fix go.mod
        run: sed -i 's|github.com/jackc/pgservicefile v0.0.0-20231201235250-de7065d787f4|github.com/jackc/pgservicefile v0.0.0-20200307190119-3fe961f6962c|g' go.mod
      - name: Generate go.sum
        run: go mod tidy
      - name: Run go vet
        run: go vet ./internal/validator/... ./internal/service/... ./internal/repository/...

  unit-test:
    name: Unit Test + Race Detector
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: pertemuan-09-cicd/pbl-taskflow-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false
      - name: Fix go.mod
        run: sed -i 's|github.com/jackc/pgservicefile v0.0.0-20231201235250-de7065d787f4|github.com/jackc/pgservicefile v0.0.0-20200307190119-3fe961f6962c|g' go.mod
      - name: Generate go.sum
        run: go mod tidy
      - name: Run unit tests with race detector
        run: go test -race -count=1 ./internal/validator/... ./internal/service/... ./internal/repository/...

  integration-test:
    name: Integration Test (PostgreSQL)
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: pertemuan-09-cicd/pbl-taskflow-go
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: taskflow
          POSTGRES_PASSWORD: taskflow_secret
          POSTGRES_DB: taskflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://taskflow:taskflow_secret@localhost:5432/taskflow?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false
      - name: Fix go.mod
        run: sed -i 's|github.com/jackc/pgservicefile v0.0.0-20231201235250-de7065d787f4|github.com/jackc/pgservicefile v0.0.0-20200307190119-3fe961f6962c|g' go.mod
      - name: Generate go.sum
        run: go mod tidy
      - name: Run integration tests
        run: go test -tags=integration -race -count=1 ./internal/validator/... ./internal/service/... ./internal/repository/...

  coverage-gate:
    name: Coverage Gate (≥75%)
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test]
    defaults:
      run:
        working-directory: pertemuan-09-cicd/pbl-taskflow-go
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: taskflow
          POSTGRES_PASSWORD: taskflow_secret
          POSTGRES_DB: taskflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://taskflow:taskflow_secret@localhost:5432/taskflow?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false
      - name: Fix go.mod
        run: sed -i 's|github.com/jackc/pgservicefile v0.0.0-20231201235250-de7065d787f4|github.com/jackc/pgservicefile v0.0.0-20200307190119-3fe961f6962c|g' go.mod
      - name: Generate go.sum
        run: go mod tidy
      - name: Run tests + coverage
        run: go test -tags=integration -coverprofile=cov.out ./internal/validator/... ./internal/service/... ./internal/repository/...
      - name: Check coverage ≥75%
        run: |
          python3 -c "
          import subprocess, sys
          r = subprocess.run(['go','tool','cover','-func=cov.out'], capture_output=True, text=True)
          for line in r.stdout.split('\n'):
              if 'total' in line:
                  pct = float(line.split()[-1].replace('%',''))
                  print(f'Coverage: {pct}%')
                  sys.exit(0 if pct >= 75 else 1)
          "
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: pertemuan-09-cicd/pbl-taskflow-go/cov.out

  build-binary:
    name: Build Binary
    runs-on: ubuntu-latest
    needs: coverage-gate
    defaults:
      run:
        working-directory: pertemuan-09-cicd/pbl-taskflow-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false
      - name: Fix go.mod
        run: sed -i 's|github.com/jackc/pgservicefile v0.0.0-20231201235250-de7065d787f4|github.com/jackc/pgservicefile v0.0.0-20200307190119-3fe961f6962c|g' go.mod
      - name: Generate go.sum
        run: go mod tidy
      - name: Build binary
        run: |
          mkdir -p bin
          go build -o bin/taskflow-api ./cmd/server/main.go

  docker-build-push:
    name: Docker Build & Push (GHCR)
    runs-on: ubuntu-latest
    needs: build-binary

    permissions:
      contents: read
      packages: write

    outputs:
      sha-tag: ${{ steps.meta.outputs.sha-tag }}

    defaults:
      run:
        working-directory: pertemuan-09-cicd/pbl-taskflow-go

    steps:
      - uses: actions/checkout@v4

      - name: Login ke GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SHA tag
        id: meta
        run: |
          SHA_TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          echo "sha-tag=$SHA_TAG" >> $GITHUB_OUTPUT

      # 🔥 FIX LOWERCASE DI SINI
      - name: Set lowercase repo
        id: repo
        run: |
          echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        run: |
          docker build -t ghcr.io/${{ steps.repo.outputs.repo }}/taskflow-api:${{ steps.meta.outputs.sha-tag }} .

      - name: Show Image Size
        run: docker images | grep taskflow-api

      - name: Push Docker Image
        run: |
          docker push ghcr.io/${{ steps.repo.outputs.repo }}/taskflow-api:${{ steps.meta.outputs.sha-tag }}

  smoke-test:
    name: Smoke Test + Stable Tag
    runs-on: ubuntu-latest
    needs: docker-build-push

    steps:
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repo
        id: repo
        run: |
          echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Pull image
        run: docker pull ghcr.io/${{ steps.repo.outputs.repo }}/taskflow-api:${{ needs.docker-build-push.outputs.sha-tag }}

      - name: Run container
        run: |
          docker run -d --name taskflow-api -p 8080:8080 \
          ghcr.io/${{ steps.repo.outputs.repo }}/taskflow-api:${{ needs.docker-build-push.outputs.sha-tag }}

      - name: Check container logs
        run: docker logs taskflow-api

      - name: Wait server ready
        run: |
          for i in {1..10}; do
            if curl -sf http://localhost:8080/health; then
              echo "Server ready!"
              exit 0
            fi
            echo "Waiting..."
            sleep 3
          done
          echo "Server not ready"
          exit 1

      - name: Test /health
        run: curl -f http://localhost:8080/health

      - name: Test /stats
        run: curl -f http://localhost:8080/api/v1/stats

      - name: Update stable tag
        run: |
          docker tag \
          ghcr.io/${{ steps.repo.outputs.repo }}/taskflow-api:${{ needs.docker-build-push.outputs.sha-tag }} \
          ghcr.io/${{ steps.repo.outputs.repo }}/taskflow-api:stable
          docker push ghcr.io/${{ steps.repo.outputs.repo }}/taskflow-api:stable