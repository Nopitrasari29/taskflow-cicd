name: CI
on:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pertemuan-09-cicd/pbl-taskflow-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false
      - name: Fix pgservicefile version
        run: |
          go get github.com/jackc/pgservicefile@v0.0.0-20200307190119-3fe961f6962c
      - name: Run unit tests
        run: go test ./internal/validator/... ./internal/service/... -v -timeout 30s